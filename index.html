<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>lit-portfolio</title>
    <link rel="stylesheet" href="./src/index.css" />
    <script type="module" src="/src/components/index.ts"></script>
    <script src="/src/assets/eventLogger.js"></script>
  </head>
  <body>
    <my-element>
      <h1>Vite + Lit</h1>
    </my-element>

    <div>
      <lp-button id="loadToggle" color="slate">Test Load Event</lp-button>
      <lp-button id="loadToggle2" color="slate">Test Load Method</lp-button>
    </div>
    <div>
      <lp-icon name="ad-circle-filled"></lp-icon>
      <lp-icon name="address-book" size="5rem" strokeWidth="1"></lp-icon>
      <lp-icon name="loader-2" strokeWidth="bold" spinner></lp-icon>
    </div>
  </body>
  <div>
    <lp-button id="testLoader" color="slate" loader icon="User">Loading Button</lp-button>
  </div>

  <script>
    function toggleLoading(button, duration = 1500) {
      // Turn loading on
      button.loading = true;

      // Turn loading off after a delay
      setTimeout(() => {
        button.loading = false;
      }, duration);
    }

    const btn = document.querySelector('#testLoader');
    const btn2 = document.querySelector('#loadToggle');
    const btn3 = document.querySelector('#loadToggle2');

    btn.addEventListener('lp-click', e => {
      toggleLoading(btn);
    });

    btn2.addEventListener('lp-click', e => {
      let isLoading = btn.loading;
      let lpId = btn.lpId;
      toggleLoading(lpId, isLoading);
    });

    btn3.addEventListener('lp-click', e => {
      btn.toggleLoading();
    });

    function toggleLoading(lpId, isLoading) {
      console.log(`Toggling loading for ${lpId} to ${isLoading}`);
      const eventName = isLoading ? 'lp-loading-end' : 'lp-loading-start';
      window.dispatchEvent( new CustomEvent(eventName, { detail: { lpId } }) );
    }
  </script>
</html>
