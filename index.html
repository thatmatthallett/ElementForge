<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/logos/ef-hex-anvil.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Element Forge</title>
    <link rel="stylesheet" href="./src/styles/index.css" />
    <script type="module" src="/src/components/index.ts"></script>
    <script type="module" src="/src/assets/eventLogger.js"></script>
  </head>
  <body>
    <div style="display:flex; gap:.75rem; align-items: center; justify-content: center; margin-bottom: 2rem;">
      <ef-icon name="ef-hex-anvil" width="10rem"></ef-icon>
      <h1 class="display logo">Element<br/>Forge</h1>
    </div>

    <div>
      <ef-button id="loadToggle" color="secondary" shape="pill">Test Load Event</ef-button>
      <ef-button id="loadToggle2" color="info" shape="square">Test Load Method</ef-button>
      <ef-button color="success" variant="link">Test Load Method</ef-button>
    </div>
    
    <div style="display:flex; gap: 3rem; margin-block: 2rem;">
      <ef-icon name="ef-ef" width="3rem"></ef-icon>
      <ef-icon name="ef-anvil" width="3rem"></ef-icon>
      <ef-icon name="ef-hex-anvil" width="3rem"></ef-icon>
      <ef-icon name="ef-hex-ef" width="3rem"></ef-icon>
      <ef-icon name="ef-hex-anvil-ef" width="6rem" height="3rem"></ef-icon>
    </div>
    
    <div>
      <ef-button id="testLoader" loader icon="User">Loading Button</ef-button>
    </div>
    <div style="margin-top: 2rem;">
      <ef-button aria-label="task-marker-1" id="testToggler" color="danger" shape="pill" icon="circle-check" toggle toggleIcon="circle-check-filled" status="info" statusMessage="Testing Status"></ef-button>
    </div>
  </body>

  <script>
    function triggerLoading(button, duration = 1500) {
      // Turn loading on
      button.loading = true;

      // Turn loading off after a delay
      setTimeout(() => {
        button.loading = false;
      }, duration);
    }

    const btn = document.querySelector('#testLoader');
    const btn2 = document.querySelector('#loadToggle');
    const btn3 = document.querySelector('#loadToggle2');
    const btnToggler = document.querySelector('#testToggler');

    btn.addEventListener('ef-click', e => {
      triggerLoading(btn);
    });

    btn2.addEventListener('ef-click', e => {
      let isLoading = btn.loading;
      let efId = btn.efId;
      toggleLoading(efId, isLoading);
    });

    btn3.addEventListener('ef-click', e => {
      btn.toggleLoading();
    });


    btnToggler.addEventListener('ef-click', e => {
      btnToggler.toggled = !btnToggler.toggled;
    });


    function toggleLoading(efId, isLoading) {
      const eventName = isLoading ? 'ef-loading-end' : 'ef-loading-start';
      window.dispatchEvent( new CustomEvent(eventName, { detail: { efId } }) );
    }
  </script>
</html>
